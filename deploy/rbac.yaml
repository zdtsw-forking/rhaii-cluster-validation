apiVersion: v1
kind: Namespace
metadata:
  name: rhaii-validation
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rhaii-validator
  namespace: rhaii-validation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rhaii-validator
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "patch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "delete"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rhaii-validator
subjects:
  - kind: ServiceAccount
    name: rhaii-validator
    namespace: rhaii-validation
roleRef:
  kind: ClusterRole
  name: rhaii-validator
  apiGroup: rbac.authorization.k8s.io
