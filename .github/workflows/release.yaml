name: Release

on:
  push:
    tags:
      - 'v*'

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/rhaii-cluster-validation/odh-rhaii-cluster-validator

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: '1.25'

      - name: Build binaries
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          IMG=${IMAGE}:${VERSION}
          LDFLAGS="-X main.version=${VERSION} -X main.defaultImage=${IMG}"

          # Linux amd64
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/kubectl-rhaii_validate-linux-amd64 ./cmd/agent/
          # Linux arm64
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/kubectl-rhaii_validate-linux-arm64 ./cmd/agent/
          # macOS amd64
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/kubectl-rhaii_validate-darwin-amd64 ./cmd/agent/
          # macOS arm64
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/kubectl-rhaii_validate-darwin-arm64 ./cmd/agent/

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container image
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          IMG=${IMAGE}:${VERSION}
          IMG_LATEST=${IMAGE}:latest

          docker build -f Dockerfile.dev --build-arg VERSION=${VERSION} --build-arg DEFAULT_IMAGE=${IMG} -t ${IMG} -t ${IMG_LATEST} .
          docker push ${IMG}
          docker push ${IMG_LATEST}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          generate_release_notes: true
          files: |
            dist/kubectl-rhaii_validate-linux-amd64
            dist/kubectl-rhaii_validate-linux-arm64
            dist/kubectl-rhaii_validate-darwin-amd64
            dist/kubectl-rhaii_validate-darwin-arm64
