apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: rhaii-validator
  namespace: rhaii-validation
  labels:
    app: rhaii-validator
spec:
  selector:
    matchLabels:
      app: rhaii-validator
  template:
    metadata:
      labels:
        app: rhaii-validator
    spec:
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
        - operator: Exists
      containers:
        - name: agent
          image: ${IMG}
          imagePullPolicy: Always
          args:
            - run
            - --node-name
            - $(NODE_NAME)
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          securityContext:
            privileged: true
          volumeMounts:
            - name: host-root
              mountPath: /host
              readOnly: true
            - name: config
              mountPath: /etc/rhaii-validate
              readOnly: true
      hostPID: true
      volumes:
        - name: host-root
          hostPath:
            path: /
            type: Directory
        - name: config
          configMap:
            name: rhaii-validate-config
            optional: true  # Agent falls back to embedded defaults if missing
      restartPolicy: Always
      serviceAccountName: rhaii-validator
