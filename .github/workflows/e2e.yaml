name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e-local:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod

      - name: Verify go.mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Build binary
        run: make build

      - name: Verify version flag
        run: ./bin/rhaii-validator --version

      - name: Run agent locally (expect check failures, no runtime errors)
        run: |
          # Checks will FAIL (no GPU/RDMA on CI runner) — that's expected.
          # What we're testing: no panics, no build errors, clean JSON output.
          set +e
          ./bin/rhaii-validator run --node-name ci-runner 2>stderr.log >stdout.log
          exit_code=$?
          set -e

          echo "=== stderr ==="
          cat stderr.log

          echo "=== stdout ==="
          cat stdout.log

          # Exit code 1 is expected (checks report FAIL)
          if [ "$exit_code" -ne 1 ]; then
            echo "ERROR: expected exit code 1 (check failures), got $exit_code"
            exit 1
          fi

          # Verify stdout is valid JSON
          if ! python3 -m json.tool stdout.log > /dev/null 2>&1; then
            echo "ERROR: stdout is not valid JSON"
            exit 1
          fi

          # Verify JSON has expected structure
          python3 -c "
          import json, sys
          report = json.load(open('stdout.log'))
          assert 'node' in report, 'missing node field'
          assert 'results' in report, 'missing results field'
          assert len(report['results']) > 0, 'no results'
          for r in report['results']:
              assert r['status'] in ('PASS', 'FAIL', 'WARN', 'SKIP'), f'invalid status: {r[\"status\"]}'
          print(f'OK: {len(report[\"results\"])} check(s), all statuses valid')
          "

      - name: Build container image
        run: docker build -f Dockerfile.dev -t rhaii-validator:ci .

      - name: Run container e2e (expect check failures, no runtime errors)
        run: |
          set +e
          docker run --rm rhaii-validator:ci run --node-name ci-container 2>stderr.log >stdout.log
          exit_code=$?
          set -e

          echo "=== container stderr ==="
          cat stderr.log

          echo "=== container stdout ==="
          cat stdout.log

          if [ "$exit_code" -ne 1 ]; then
            echo "ERROR: expected exit code 1, got $exit_code"
            exit 1
          fi

          if ! python3 -m json.tool stdout.log > /dev/null 2>&1; then
            echo "ERROR: container stdout is not valid JSON"
            exit 1
          fi

          echo "Container e2e passed (checks failed as expected, no runtime errors)"
