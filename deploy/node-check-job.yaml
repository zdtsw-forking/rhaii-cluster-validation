apiVersion: batch/v1
kind: Job
metadata:
  name: rhaii-validate-check
  namespace: rhaii-validation
  labels:
    app: rhaii-validate-check
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: rhaii-validate-check
    spec:
      tolerations:
        - operator: Exists
      hostPID: true
      containers:
        - name: checker
          image: ${IMG}
          imagePullPolicy: Always
          securityContext:
            privileged: true
          args:
            - run
            - --node-name
            - $(NODE_NAME)
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: host-root
              mountPath: /host
              readOnly: true
            - name: config
              mountPath: /etc/rhaii-validate
              readOnly: true
      volumes:
        - name: host-root
          hostPath:
            path: /
            type: Directory
        - name: config
          configMap:
            name: rhaii-validate-config
            optional: true
      restartPolicy: Never
      serviceAccountName: rhaii-validator
